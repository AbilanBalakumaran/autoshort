<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimaShorts AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>🎌 AnimaShorts AI</h1>
    <p>Colle une actu anime/manga → reçois un prompt vidéo prêt à l'emploi.</p>

    <form id="prompt-form">
      <textarea id="prompt" placeholder="Colle ici le texte de l'actu (ex: annonce, réaction, news manga...)" required></textarea>
      <button type="submit">Générer le prompt</button>
    </form>

    <section id="result" hidden>
      <h2>Prompt vidéo généré</h2>
      <pre id="script-output"></pre>
    </section>

    <p id="status"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
