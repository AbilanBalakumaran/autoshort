<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>autoshort</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>🎌 autoshort</h1>

    <nav class="tabs">
      <button type="button" class="tab-btn active" data-tab="generate">Accueil</button>
      <button type="button" class="tab-btn" data-tab="settings">Settings</button>
    </nav>

    <section id="tab-generate" class="tab-panel">
      <p>Colle une actu anime/manga → reçois un prompt vidéo prêt à l'emploi.</p>

      <form id="prompt-form">
        <textarea id="prompt" placeholder="Colle ici le texte de l'actu (ex: annonce, réaction, news manga...)" required></textarea>
        <div class="button-row">
          <button type="submit">Générer le script</button>
          <button type="button" id="clear-btn">Vider</button>
        </div>
      </form>

      <section id="result" hidden>
        <h2>Script vocal généré</h2>
        <pre id="script-output"></pre>
        <button type="button" id="generate-audio-btn">Générer l'audio</button>
        <audio id="audio-player" controls hidden></audio>
      </section>

      <p id="status"></p>
    </section>

    <section id="tab-settings" class="tab-panel" hidden>
      <p>Personnalise le template utilisé pour générer le prompt vidéo.</p>
      <textarea id="template-input" class="template-textarea"></textarea>
      <div class="button-row">
        <button type="button" id="save-template-btn">Enregistrer</button>
        <button type="button" id="reset-template-btn">Réinitialiser</button>
      </div>
      <p id="settings-status"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
